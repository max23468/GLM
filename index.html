<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
    <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Simulatore gara TPL lotti 1-4</title>
    <script>
      (() => {
        try {
          const stored = window.localStorage.getItem("tpl-lotti-1-4-theme") || window.localStorage.getItem("tpl-simulator-theme");
          const preference = stored === "light" || stored === "dark" || stored === "auto" ? stored : "auto";
          const resolved =
            preference === "auto" && window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : preference === "dark"
                ? "dark"
                : "light";
          document.documentElement.dataset.theme = resolved;
          document.documentElement.dataset.themePreference = preference;
          document.documentElement.style.colorScheme = resolved;
        } catch {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
