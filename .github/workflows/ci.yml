name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: 24.15.0

jobs:
  verify:
    name: Verifica simulatore
    runs-on: ubuntu-latest
    env:
      DOPPLER_PROJECT: ${{ vars.DOPPLER_PROJECT }}
      DOPPLER_CONFIG: ${{ vars.DOPPLER_CONFIG }}
      DOPPLER_TOKEN_PRESENT: ${{ secrets.DOPPLER_TOKEN != '' && 'true' || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verifica variabili Doppler
        run: |
          if [ -z "${DOPPLER_PROJECT:-}" ]; then
            echo "::warning::DOPPLER_PROJECT non impostato"
          fi
          if [ -z "${DOPPLER_CONFIG:-}" ]; then
            echo "::warning::DOPPLER_CONFIG non impostata"
          fi
          if [ -z "${DOPPLER_TOKEN_PRESENT:-}" ]; then
            echo "::notice::DOPPLER_TOKEN assente: il fetch non verrà eseguito."
          fi

      - name: Determina se eseguire il fetch Doppler
        id: doppler_fetch_gate
        run: |
          if [ -n "${DOPPLER_TOKEN_PRESENT:-}" ] && [ -n "${DOPPLER_PROJECT:-}" ] && [ -n "${DOPPLER_CONFIG:-}" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch secrets from Doppler
        if: ${{ steps.doppler_fetch_gate.outputs.run == 'true' }}
        continue-on-error: true
        uses: dopplerhq/secrets-fetch-action@v2.0.0
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          doppler-project: ${{ vars.DOPPLER_PROJECT }}
          doppler-config: ${{ vars.DOPPLER_CONFIG }}
          inject-env-vars: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check dati gara e scenari versionati
        run: npm run validate:data

      - name: Test
        run: npm test

      - name: Coverage core
        run: npm run test:coverage:core

      - name: Build
        run: npm run build

  deploy-preview:
    name: Preview Cloudflare Pages
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'pull_request'
    env:
      DOPPLER_PROJECT: ${{ vars.DOPPLER_PROJECT }}
      DOPPLER_CONFIG: ${{ vars.DOPPLER_CONFIG }}
      DOPPLER_TOKEN_PRESENT: ${{ secrets.DOPPLER_TOKEN != '' && 'true' || '' }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      SMOKE_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      SMOKE_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      VITE_CF_WEB_ANALYTICS_TOKEN: ${{ secrets.VITE_CF_WEB_ANALYTICS_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Determina se eseguire il fetch Doppler
        id: deploy_doppler_fetch_gate
        run: |
          if [ -n "${DOPPLER_TOKEN_PRESENT:-}" ] && [ -n "${DOPPLER_PROJECT:-}" ] && [ -n "${DOPPLER_CONFIG:-}" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verifica variabili Doppler
        run: |
          if [ -z "${DOPPLER_PROJECT:-}" ]; then
            echo "::warning::DOPPLER_PROJECT non impostato"
          fi
          if [ -z "${DOPPLER_CONFIG:-}" ]; then
            echo "::warning::DOPPLER_CONFIG non impostata"
          fi
          if [ -z "${DOPPLER_TOKEN_PRESENT:-}" ]; then
            echo "::notice::DOPPLER_TOKEN assente: il fetch non verrà eseguito."
          fi

      - name: Fetch secrets from Doppler
        if: ${{ steps.deploy_doppler_fetch_gate.outputs.run == 'true' }}
        continue-on-error: true
        uses: dopplerhq/secrets-fetch-action@v2.0.0
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          doppler-project: ${{ vars.DOPPLER_PROJECT }}
          doppler-config: ${{ vars.DOPPLER_CONFIG }}
          inject-env-vars: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browser
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Diagnosi credenziali deploy
        if: ${{ env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_API_TOKEN != '' }}
        run: npm run deploy:doctor

      - name: Deploy preview e smoke
        if: ${{ env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_API_TOKEN != '' }}
        run: npm run deploy:preview -- --branch "$GITHUB_HEAD_REF"

      - name: Preview non pubblicata
        if: ${{ env.CLOUDFLARE_ACCOUNT_ID == '' || env.CLOUDFLARE_API_TOKEN == '' }}
        run: 'echo "::notice::Preview Cloudflare saltata: configura CLOUDFLARE_ACCOUNT_ID e CLOUDFLARE_API_TOKEN nei secrets GitHub."'
