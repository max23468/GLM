name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: 24.18.0

jobs:
  verify:
    name: Verifica simulatore
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check dati gara e scenari versionati
        run: npm run validate:data

      - name: Test
        run: npm test

      - name: Coverage core
        run: npm run test:coverage:core

      - name: Build
        run: npm run build

  deploy-preview:
    name: Preview Cloudflare Pages
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'pull_request'
    env:
      CLOUDFLARE_CREDENTIALS_CONFIGURED: ${{ secrets.CLOUDFLARE_ACCOUNT_ID != '' && secrets.CLOUDFLARE_API_TOKEN != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Classifica diff preview
        id: preview_scope
        run: |
          set -euo pipefail
          base_sha="${{ github.event.pull_request.base.sha }}"
          git fetch --no-tags --depth=1 origin "$base_sha"
          changed_files="$(git diff --name-only "$base_sha" HEAD)"
          printf 'File cambiati nella PR:\n%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | grep -Eq '^(src/|public/|functions/|data/|scripts/(deploy-cloudflare|smoke)\.mjs|package(-lock)?\.json|index\.html|vite\.config\.[cm]?[jt]s|tsconfig.*\.json|wrangler\.toml|_headers|_redirects)'; then
            echo "needs_preview=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_preview=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Preview Cloudflare saltata: diff solo documentale/governance."
          fi

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Cache Playwright browser
        if: ${{ steps.preview_scope.outputs.needs_preview == 'true' && env.CLOUDFLARE_CREDENTIALS_CONFIGURED == 'true' }}
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browser
        if: ${{ steps.preview_scope.outputs.needs_preview == 'true' && env.CLOUDFLARE_CREDENTIALS_CONFIGURED == 'true' }}
        run: npx playwright install chromium

      - name: Diagnosi credenziali deploy
        if: ${{ steps.preview_scope.outputs.needs_preview == 'true' && env.CLOUDFLARE_CREDENTIALS_CONFIGURED == 'true' }}
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          SMOKE_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          SMOKE_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: npm run deploy:doctor

      - name: Deploy preview e smoke
        if: ${{ steps.preview_scope.outputs.needs_preview == 'true' && env.CLOUDFLARE_CREDENTIALS_CONFIGURED == 'true' }}
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          SMOKE_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          SMOKE_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          VITE_CF_WEB_ANALYTICS_TOKEN: ${{ secrets.VITE_CF_WEB_ANALYTICS_TOKEN }}
        run: npm run deploy:preview -- --branch "$GITHUB_HEAD_REF"

      - name: Preview non pubblicata
        if: ${{ steps.preview_scope.outputs.needs_preview == 'true' && env.CLOUDFLARE_CREDENTIALS_CONFIGURED != 'true' }}
        run: 'echo "::notice::Preview Cloudflare saltata: configura CLOUDFLARE_ACCOUNT_ID e CLOUDFLARE_API_TOKEN nei secrets GitHub."'

      - name: Preview non necessaria
        if: ${{ steps.preview_scope.outputs.needs_preview != 'true' }}
        run: 'echo "::notice::Preview Cloudflare non necessaria per questo diff."'

  deploy-production:
    name: Deploy Cloudflare Pages (produzione)
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    env:
      CLOUDFLARE_CREDENTIALS_CONFIGURED: ${{ secrets.CLOUDFLARE_ACCOUNT_ID != '' && secrets.CLOUDFLARE_API_TOKEN != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Credenziali Cloudflare mancanti
        if: ${{ env.CLOUDFLARE_CREDENTIALS_CONFIGURED != 'true' }}
        run: |
          echo "::error::Deploy produzione saltato: configura CLOUDFLARE_ACCOUNT_ID e CLOUDFLARE_API_TOKEN nei secrets GitHub."
          exit 1

      - name: Cache Playwright browser
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Diagnosi credenziali deploy
        run: npm run deploy:doctor
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          SMOKE_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          SMOKE_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}

      - name: Deploy produzione e smoke
        run: npm run deploy:cloudflare
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          SMOKE_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          SMOKE_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          VITE_CF_WEB_ANALYTICS_TOKEN: ${{ secrets.VITE_CF_WEB_ANALYTICS_TOKEN }}
