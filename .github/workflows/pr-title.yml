name: PR title

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read

jobs:
  conventional-title:
    runs-on: ubuntu-latest
    steps:
      - name: Check title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if ! echo "$PR_TITLE" | grep -Eq '^(feat|fix|perf|docs|test|chore|ci|refactor|build|style)(\([a-z0-9._-]+\))?!?: .+'; then
            echo "PR title must follow Conventional Commits (for example: feat:, fix(ui): ..., chore!: ...)"
            exit 1
          fi
